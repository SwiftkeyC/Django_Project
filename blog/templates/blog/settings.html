<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Page</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="wrapper">

    
  <div class="sidebarr">
    <h3>Settings</h3>
    <ul>
      <li>Manage Account</li>
      <li>Privacy Settings</li>
      <li>Accessibility</li>
      <li>Language</li>
      <li>Help</li>
    </ul>
  </div>

    <!-- Content -->
  <div class="content">

    <section class="section">
      <h2>User Information</h2>
      <div class="field"><span></span><input type="text" placeholder="Username"></div>
      <div class="field"><span></span><input type="text" placeholder="Username"></div>
      <div class="field"><span></span><input type="text" placeholder="Username"></div>
    </section>

    <section class="section large">
      <h2>Creation and Business Tools</h2>
      <button class="btn">Add card details</button>
      <button class="btn">Upload an advertisement</button>
      <button class="btn">Verified accounts</button>
    </section>

    <section class="section">
      <h2>Manage Accessibilities</h2>
      <input type="text" class="input" placeholder="Notifications">
      <input type="text" class="input" placeholder="Location allowance">
      <input type="text" class="input" placeholder="Camera allowance">
    </section>

    <section class="section">
      <h2>Choose Language</h2>
      <select class="input">
        <option>Select language</option>
        <option>English</option>
        <option>Spanish</option>
        <option>French</option>
      </select>
    </section>

    <section class="section">
      <h2>Help & FAQs</h2>
      <p>Click here for support and frequently asked questions.</p>
    </section>

  </div>

</div>

</body>
</html>
